<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEHIPEDS | Live Virtual Campus</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dark: #001a33; --orange: #ff4500; --gold: #ffd700; --lecturer: #ff4500; --student: #007bff; }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; }

        /* VIRTUAL CLASSROOM BOX */
        .live-status { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-weight: bold; }
        .live-indicator { width: 12px; height: 12px; background: #ff0000; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .class-card { background: linear-gradient(135deg, #001a33 0%, #003366 100%); color: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); }
        
        .room-info { background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 8px; font-family: monospace; font-size: 14px; margin-bottom: 20px; color: var(--gold); }

        .btn { padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-live { background: var(--orange); color: white; box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3); }
        .btn-join { background: var(--student); color: white; box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3); }

        header { background: var(--dark); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--orange); }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">HEHIPEDS DIGITAL CAMPUS</h2>
</header>

<div style="max-width: 800px; margin: auto; padding: 20px;">
    
    <div id="v-portal" class="class-card">
        <div class="live-status">
            <div class="live-indicator"></div>
            <span id="p-role-text">HEHIPEDS VIRTUAL HUB</span>
        </div>

        <h2 id="u-dept" style="margin: 0 0 10px 0;">Departmental Stream</h2>
        <div class="room-info" id="room-id">Syncing encrypted room...</div>

        <p style="font-size: 14px; opacity: 0.8; line-height: 1.5; margin-bottom: 25px;">
            This session is encrypted. By joining, you agree to the HEHIPEDS code of conduct for digital learning.
        </p>

        <div id="sec-lecturer" style="display:none;">
            <button class="btn btn-live" onclick="startClass()">
                📡 START BROADCAST TO STUDENTS
            </button>
            <p style="text-align:center; font-size:12px; margin-top:10px; color: #a5b4fc;">
                Tip: Ensure your camera and microphone are allowed.
            </p>
        </div>

        <div id="sec-student" style="display:none;">
            <button class="btn btn-join" onclick="joinClass()">
                🎧 JOIN LIVE DEPARTMENT LECTURE
            </button>
        </div>
    </div>

</div>

<script>
const S_URL = 'https://cajqytcvqrewrytupnul.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhanF5dGN2cXJld3J5dHVwbnVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgxNTMwNjYsImV4cCI6MjA4MzcyOTA2Nn0.ylqZYBw3GQHRx-ohRZGyitahE5Jo3brEE7A9qK41GpY';
const sb = supabase.createClient(S_URL, S_KEY);
let user = null;

sb.auth.onAuthStateChange(async (e, s) => {
    if(s) {
        let { data: p } = await sb.from('profiles').select('*').eq('id', s.user.id).single();
        if(p) {
            user = p;
            u_dept.innerText = p.department;
            const cleanRoom = p.department.replace(/\s/g, '_').toLowerCase();
            room_id.innerText = `SECURE_ID: HEHIPEDS_${cleanRoom}_2026`;
            
            if(p.role === 'Lecturer') {
                sec_lecturer.style.display = 'block';
                document.getElementById('p-role-text').innerText = "FACULTY BROADCAST MODE";
            } else {
                sec_student.style.display = 'block';
                document.getElementById('p-role-text').innerText = "STUDENT VIEWING MODE";
            }
        }
    }
});

// THE VIRTUAL CLASS LOGIC
function startClass() {
    const room = user.department.replace(/\s/g, '_').toLowerCase();
    // Opens the camera feed and creates the room
    window.open(`https://vdo.ninja/?push=HEHIPEDS_${room}&label=${user.full_name}&view`, '_blank');
}

function joinClass() {
    const room = user.department.replace(/\s/g, '_').toLowerCase();
    // Joins the existing room as a viewer
    window.open(`https://vdo.ninja/?view=HEHIPEDS_${room}`, '_blank');
}
</script>
</body>
              </html>
